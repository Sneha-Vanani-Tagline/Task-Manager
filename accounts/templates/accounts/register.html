{% extends 'base.html' %}

{% block content %}

    <form action="{% url 'accounts:login' %}">
        
        <div>
            <label for="username">Username</label>
            <input type="email" id="username">
        </div>

        <div>
            <label for="password">Password</label>
            <input type="password" id="password">
        </div>

        <div>
            <input type="submit" value="Login">
        </div>
    </form>
{% endblock %}
